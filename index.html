<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jood Piece Application</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{
    font-family:'Plus Jakarta Sans',sans-serif;
}

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

.glass{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.fade{
    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.input{
    width:100%;
    padding:15px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    outline:none;
    color:white;
}

.input:focus{
    border-color:white;
}

.tab{
    transition:.25s;
}

.tab.active{
    background:white;
    color:black;
}

.btn{
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-[600px] h-[600px] bg-white/5 blur-[140px] rounded-full -top-52 -left-52"></div>
    <div class="absolute w-[500px] h-[500px] bg-white/5 blur-[140px] rounded-full bottom-0 right-0"></div>
</div>

<!-- LOGIN -->
<section id="loginPage" class="min-h-screen flex items-center justify-center p-6 relative z-10">
    <div class="glass max-w-md w-full rounded-[34px] p-8 fade">

        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 rounded-3xl bg-white text-black flex items-center justify-center">
                <i data-lucide="shield-half"></i>
            </div>

            <div>
                <h1 class="text-3xl font-bold">Jood Piece System</h1>
                <p class="text-white/50">Discord OAuth2 Authentication</p>
            </div>
        </div>

        <button
            onclick="discordLogin()"
            class="btn bg-white text-black w-full py-4 rounded-2xl font-semibold flex items-center justify-center gap-3"
        >
            <i data-lucide="disc"></i>
            Continue With Discord
        </button>

    </div>
</section>

<!-- APP -->
<section id="app" class="hidden relative z-10">

    <nav class="sticky top-0 z-50 p-4">
        <div class="glass rounded-[30px] p-3 flex items-center justify-between">

            <div class="flex items-center gap-3">
                <img
                    id="avatar"
                    class="w-12 h-12 rounded-2xl object-cover"
                    alt="avatar"
                >

                <div>
                    <h2 id="username" class="font-bold"></h2>
                    <p class="text-white/50 text-xs">Authenticated User</p>
                </div>
            </div>

            <div class="flex items-center gap-2 flex-wrap">
                <button class="tab active px-4 py-2 rounded-xl text-sm">
                    Home
                </button>

                <button onclick="logout()" class="tab px-4 py-2 rounded-xl text-sm text-red-300">
                    Logout
                </button>
            </div>

        </div>
    </nav>

    <main class="p-4">

        <section id="homePage">

            <div class="glass rounded-[38px] p-8 fade">

                <h1 class="text-5xl font-bold leading-tight mb-5">
                    Jood Piece
                    <br>
                    Application System
                </h1>

                <p class="text-white/50 max-w-2xl">
                    Official Discord OAuth2 Login System
                </p>

            </div>

        </section>

    </main>

</section>

<script>
lucide.createIcons();

const CLIENT_ID = "1500135273571549224";

const REDIRECT_URI = "https://joodpiece.netlify.app/";

let currentUser = null;

// ===================== LOGIN =====================

function discordLogin(){

    window.location.href =
    "https://discord.com/oauth2/authorize?client_id=1500135273571549224&response_type=code&redirect_uri=https%3A%2F%2Fjoodpiece.netlify.app%2F&scope=identify";

}

// ===================== INIT =====================

async function initLogin(){

    if(location.hash.includes("access_token")){

        const params = new URLSearchParams(location.hash.substring(1));

        const token = params.get("access_token");

        if(token){

            localStorage.setItem("discord_token",token);

            window.location.replace(REDIRECT_URI);

        }

        return;
    }

    const saved = localStorage.getItem("discord_token");

    if(!saved) return;

    try{

        const user = await getDiscordUser(saved);

        currentUser = user;

        document.getElementById("loginPage").classList.add("hidden");

        document.getElementById("app").classList.remove("hidden");

        document.getElementById("username").innerText =
        user.username;

        const avatarEl =
        document.getElementById("avatar");

        if(user.avatar){

            avatarEl.src =
            `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

        }else{

            avatarEl.src =
            "https://cdn.discordapp.com/embed/avatars/0.png";

        }

    }catch(err){

        console.error(err);

        localStorage.removeItem("discord_token");

    }

}

// ===================== DISCORD USER =====================

async function getDiscordUser(token){

    const res = await fetch(
        "https://discord.com/api/users/@me",
        {
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    if(!res.ok){

        throw new Error("Failed to fetch user");

    }

    return await res.json();

}

// ===================== LOGOUT =====================

function logout(){

    localStorage.removeItem("discord_token");

    currentUser = null;

    location.reload();

}

// ===================== START =====================

initLogin();
</script>

</body>
</html>
